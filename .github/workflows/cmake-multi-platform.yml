name: CI - agi_up (CMake)

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.27.0'

    - name: Install prerequisites (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev libglu1-mesa-dev

    - name: Install prerequisites (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install pkg-config

    - name: Install prerequisites (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install -y mingw make || true
        # GitHub Windows runners already include Visual Studio; no extra steps normally required.

    - name: Configure
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}

    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build-type }} -- -j

    - name: Test
      run: |
        cd build
        ctest --output-on-failure -C ${{ matrix.build-type }}
